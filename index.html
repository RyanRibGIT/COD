<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0D0D">
<title>CTOP — Feira de Informática</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #F5C200; --black: #0D0D0D; }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
  }

  /* ══════════════════════════════
     SPLASH SCREEN
  ══════════════════════════════ */
  #splash {
    position: fixed; inset: 0;
    background: var(--black);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 1s ease, visibility 1s ease;
  }
  #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .splash-ring {
    position: relative;
    width: 140px; height: 140px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
  }
  .splash-ring::before,
  .splash-ring::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid var(--gold);
    animation: ringExpand 2s ease-out infinite;
  }
  .splash-ring::after { animation-delay: 1s; }
  @keyframes ringExpand {
    0%   { transform: scale(.75); opacity: 1; }
    100% { transform: scale(2);   opacity: 0; }
  }

  .splash-logo-wrap {
    width: 108px; height: 108px;
    border-radius: 50%;
    background: var(--black);
    border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    animation: splashPulse 1.6s ease-in-out infinite;
  }
  @keyframes splashPulse {
    0%,100% { box-shadow: 0 0 20px rgba(245,194,0,.4); }
    50%      { box-shadow: 0 0 60px rgba(245,194,0,1), 0 0 100px rgba(245,194,0,.3); }
  }
  .splash-logo-wrap img {
    width: 80px; height: 80px;
    object-fit: contain;
    border-radius: 50%;
  }

  .splash-tagline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .splash-dots { display: flex; gap: 8px; }
  .splash-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .splash-dot:nth-child(2) { animation-delay: .2s; }
  .splash-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes dotBounce {
    0%,80%,100% { transform: translateY(0);     opacity: .4; }
    40%          { transform: translateY(-10px);  opacity: 1;  }
  }

  /* ══════════════════════════════
     CARDS
  ══════════════════════════════ */
  .card {
    display: none;
    width: 100%; height: 100dvh;
    position: relative;
    overflow: hidden;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }
  .card.active {
    display: flex;
    animation: cardReveal 1.2s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: scale(1.06); }
    to   { opacity: 1; transform: scale(1);    }
  }

  /* Full-screen background image */
  .card-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 1;
    /* guarantee visibility — never hidden by default */
    display: block;
  }

  .card-vignette {
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.5) 0%, transparent 25%),
      linear-gradient(to top,    rgba(0,0,0,.4) 0%, transparent 20%);
    z-index: 2;
    pointer-events: none;
  }

  .particle-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  /* ══════════════════════════════
     LOGO BADGE
  ══════════════════════════════ */
  .logo-badge {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    z-index: 10;
    animation: badgeDrop .9s .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes badgeDrop {
    from { opacity: 0; transform: translateX(-50%) translateY(-28px) scale(.8); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0)     scale(1);  }
  }

  .logo-circle {
    width: 66px; height: 66px;
    border-radius: 50%;
    background: rgba(13,13,13,.85);
    border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    animation: logoPing 3s 1.5s ease-in-out infinite;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  @keyframes logoPing {
    0%,100% { box-shadow: 0 0 0  0  rgba(245,194,0,.55); }
    50%      { box-shadow: 0 0 0 14px rgba(245,194,0,0);  }
  }
  .logo-circle img {
    width: 50px; height: 50px;
    object-fit: contain;
    border-radius: 50%;
  }

  .logo-label {
    margin-top: 5px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: .6rem; letter-spacing: 3px;
    color: var(--gold); opacity: .85;
    text-shadow: 0 1px 4px rgba(0,0,0,.8);
  }

  /* ══════════════════════════════
     FOOTER
  ══════════════════════════════ */
  .card-footer {
    position: absolute;
    bottom: 12px; left: 0; right: 0;
    text-align: center;
    z-index: 10;
    font-family: 'Bebas Neue', sans-serif;
    font-size: .52rem; letter-spacing: 3px;
    color: rgba(245,194,0,.45);
    text-shadow: 0 1px 4px rgba(0,0,0,.9);
    animation: footerFade 1s 1.2s both;
  }
  @keyframes footerFade { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<!-- SPLASH -->

  <div class="logo-badge">

  </div>

<!-- CARD 3 — imagem3.png -->
<div id="card3" class="card">
  <img class="card-bg" id="bg3" src="imagem3.png" alt="Lembrancinha 3">
  <div class="card-vignette"></div>
  <canvas class="particle-canvas" id="canvas3"></canvas>
  <div class="logo-badge">
    <div class="logo-circle"><img src="logo.png" alt="CTOP"></div>
    <span class="logo-label">ESCOLA DE PROFISSÕES</span>
  </div>
  <div class="card-footer">CTOP · FEIRA DE INFORMÁTICA 2026</div>

<div id="card4" class="card">
  <img class="card-bg" id="bg4" src="imagem4.png" alt="Lembrancinha 4">
  <div class="card-vignette"></div>
  <canvas class="particle-canvas" id="canvas4"></canvas>
  <div class="logo-badge">
    <div class="logo-circle"><img src="logo.png" alt="CTOP"></div>

<script>
/* ══════════════════════════════════════════════════════════
   1. RANDOM SELECTION — truly non-repeating
   ──────────────────────────────────────────────────────────
   Uses sessionStorage to remember the last card shown.
   On each visit, shuffles the remaining 4 cards so the same
   image is NEVER shown twice in a row.
   Also seeds from crypto.getRandomValues when available
   for a higher-quality random source.
══════════════════════════════════════════════════════════ */

function secureRandInt(max) {
  if (window.crypto && window.crypto.getRandomValues) {
    const arr = new Uint32Array(1);
    window.crypto.getRandomValues(arr);
    return arr[0] % max;
  }
  return Math.floor(Math.random() * max);
}

function pickCard() {
  const ALL = [1, 2, 3, 4, 5];
  const lastRaw = sessionStorage.getItem('ctop_last_card');
  const last = lastRaw ? parseInt(lastRaw) : null;

  // Build pool: exclude the last shown card to prevent immediate repeat
  const pool = last !== null ? ALL.filter(n => n !== last) : ALL;

  // Pick from pool using secure random
  const chosen = pool[secureRandInt(pool.length)];
  sessionStorage.setItem('ctop_last_card', String(chosen));
  return chosen;
}

const CHOSEN_INDEX = pickCard();
const CHOSEN_ID    = 'card' + CHOSEN_INDEX;

/* ══════════════════════════════════════════════════════════
   2. IMAGE PRELOADING — show card only after image is ready
   ──────────────────────────────────────────────────────────
   Preloads ALL 5 images in background. When the chosen
   image finishes loading (or fails), activates its card
   and hides splash. This prevents blank screens.
══════════════════════════════════════════════════════════ */

const IMAGE_FILES = ['imagem1.png','imagem2.png','imagem3.png','imagem4.png','imagem5.png'];
let chosenLoaded  = false;
let splashMinDone = false;   // 2.2 s minimum splash time

function tryReveal() {
  if (chosenLoaded && splashMinDone) {
    document.getElementById(CHOSEN_ID).classList.add('active');
    document.getElementById('splash').classList.add('hidden');
    startParticles(CHOSEN_INDEX);
  }
}

// Minimum splash time (2.2 s) — keeps UX smooth
setTimeout(() => { splashMinDone = true; tryReveal(); }, 2200);

// Preload all images; flag when the chosen one is ready
IMAGE_FILES.forEach((file, i) => {
  const img = new Image();
  img.onload = img.onerror = () => {
    if (i + 1 === CHOSEN_INDEX) {
      // Update the actual <img> src to already-cached version
      const bgEl = document.getElementById('bg' + CHOSEN_INDEX);
      if (bgEl) bgEl.src = file;
      chosenLoaded = true;
      tryReveal();
    }
  };
  img.src = file;
});

/* ══════════════════════════════════════════════════════════
   3. PARTICLE ANIMATIONS
══════════════════════════════════════════════════════════ */

function rand(min, max) { return Math.random() * (max - min) + min; }

function setupCanvas(id) {
  const cv = document.getElementById(id);
  if (!cv) return null;
  const ctx = cv.getContext('2d');
  function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  return { cv, ctx };
}

function startParticles(index) {

  /* ══════════════════════════════════════════════════════
     CARD 1 — Fireworks + floating orbs + sparkle trails
     Confetti bursts erupt from random points, each burst
     sends out 20 petals that arc outward, fade, and leave
     a glowing orb behind. Continuous golden sparkles drift
     upward like embers from a fire.
  ══════════════════════════════════════════════════════ */
  if (index === 1) {
    const { cv, ctx } = setupCanvas('canvas1');

    // Drifting ember sparks
    const embers = Array.from({ length: 70 }, () => ({
      x: rand(0, cv.width), y: rand(0, cv.height),
      vx: rand(-0.5, 0.5), vy: rand(-1.2, -0.3),
      r: rand(1, 3.5), op: rand(0.3, 1),
      fade: rand(0.003, 0.01),
      wobble: rand(0, Math.PI * 2), wobbleSpd: rand(0.02, 0.06),
    }));

    // Active firework bursts
    const bursts = [];
    function spawnBurst() {
      const x = rand(cv.width * .1, cv.width * .9);
      const y = rand(cv.height * .1, cv.height * .7);
      const hue = rand(35, 55); // gold range
      const petals = Array.from({ length: 22 }, (_, i) => {
        const angle = (i / 22) * Math.PI * 2;
        const speed = rand(1.5, 4.5);
        return {
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: rand(2, 5), op: 1,
          color: `hsl(${hue},100%,${rand(55,80)}%)`,
          tail: [],
        };
      });
      bursts.push({ petals, life: 1 });
    }
    setInterval(spawnBurst, 1200);
    setTimeout(spawnBurst, 100);

    // Glowing orbs that linger
    const orbs = Array.from({ length: 8 }, () => ({
      x: rand(0, cv.width), y: rand(0, cv.height),
      r: rand(8, 22), op: rand(0.05, 0.18),
      pulseSpd: rand(0.01, 0.025), phase: rand(0, Math.PI * 2),
    }));

    (function draw() {
      ctx.clearRect(0, 0, cv.width, cv.height);

      // Orbs
      orbs.forEach(o => {
        o.phase += o.pulseSpd;
        const a = o.op + Math.sin(o.phase) * 0.06;
        const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
        g.addColorStop(0,   `rgba(245,194,0,${a})`);
        g.addColorStop(.6,  `rgba(245,194,0,${a * .4})`);
        g.addColorStop(1,   'rgba(245,194,0,0)');
        ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
      });

      // Embers
      embers.forEach(s => {
        s.wobble += s.wobbleSpd;
        s.x += s.vx + Math.sin(s.wobble) * 0.4;
        s.y += s.vy; s.op -= s.fade;
        if (s.op <= 0 || s.y < -10) {
          s.x = rand(0, cv.width); s.y = cv.height + 5;
          s.op = rand(0.5, 1); s.vy = rand(-1.2, -0.3);
        }
        const g2 = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 2);
        g2.addColorStop(0,  `rgba(255,230,80,${s.op})`);
        g2.addColorStop(1,  'rgba(245,194,0,0)');
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = g2; ctx.fill();
      });

      // Firework bursts
      for (let bi = bursts.length - 1; bi >= 0; bi--) {
        const b = bursts[bi];
        b.life -= 0.012;
        b.petals.forEach(p => {
          p.tail.push({ x: p.x, y: p.y });
          if (p.tail.length > 6) p.tail.shift();
          p.x += p.vx; p.y += p.vy;
          p.vy += 0.06; // gravity
          p.vx *= 0.97; p.vy *= 0.97;
          p.op = b.life;
          // tail
          p.tail.forEach((t, ti) => {
            const ta = (ti / p.tail.length) * p.op * 0.6;
            ctx.beginPath(); ctx.arc(t.x, t.y, p.r * (ti / p.tail.length) * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = p.color.replace(')', `,${ta})`).replace('hsl', 'hsla');
            ctx.fill();
          });
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.color.replace(')', `,${p.op})`).replace('hsl', 'hsla');
          ctx.fill();
        });
        if (b.life <= 0) bursts.splice(bi, 1);
      }
      requestAnimationFrame(draw);
    })();
  }

  /* ══════════════════════════════════════════════════════
     CARD 2 — Matrix rain with lightning bolts
     Characters cascade down in columns. Every 3 seconds a
     jagged electric bolt zaps diagonally across the screen.
     Glowing circuit nodes pulse at random positions.
  ══════════════════════════════════════════════════════ */
  if (index === 2) {
    const { cv, ctx } = setupCanvas('canvas2');
    const FS = 13;
    let cols = Math.floor(cv.width / FS);
    let drops = Array(cols).fill(() => rand(0, cv.height / FS)).map(f => f());
    const CHARS = 'ABCDEF0123456789アイウエカキクケコ<>{}[]//\\!@#$%';
    window.addEventListener('resize', () => {
      cols = Math.floor(cv.width / FS);
      drops = Array(cols).fill(0).map(() => rand(0, cv.height / FS));
    });

    // Lightning bolts
    const bolts = [];
    function spawnBolt() {
      const pts = [];
      let x = rand(0, cv.width), y = 0;
      while (y < cv.height) {
        pts.push({ x, y });
        y += rand(18, 40);
        x += rand(-60, 60);
      }
      bolts.push({ pts, op: 1, w: rand(1.5, 3) });
    }
    setInterval(spawnBolt, 2800);

    // Circuit nodes
    const nodes = Array.from({ length: 12 }, () => ({
      x: rand(0, cv.width), y: rand(0, cv.height),
      r: rand(3, 7), phase: rand(0, Math.PI * 2),
      spd: rand(0.03, 0.07),
    }));

    setInterval(() => {
      ctx.clearRect(0, 0, cv.width, cv.height);

      // Matrix columns
      ctx.font = FS + 'px Share Tech Mono, monospace';
      for (let i = 0; i < drops.length; i++) {
        const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
        const bright = Math.floor(120 + Math.random() * 80);
        const isHead = Math.random() > 0.85;
        ctx.fillStyle = isHead
          ? `rgba(255,255,200,${0.9})`
          : `rgba(245,${bright},0,${0.3 + Math.random() * 0.4})`;
        ctx.fillText(ch, i * FS, drops[i] * FS);
        if (drops[i] * FS > cv.height && Math.random() > .965) drops[i] = 0;
        drops[i] += 0.6;
      }

      // Nodes
      nodes.forEach(n => {
        n.phase += n.spd;
        const a = 0.3 + Math.sin(n.phase) * 0.25;
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 3);
        g.addColorStop(0,  `rgba(245,194,0,${a + 0.3})`);
        g.addColorStop(1,  'rgba(245,194,0,0)');
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(245,194,0,${a + 0.4})`; ctx.fill();
      });

      // Lightning
      for (let bi = bolts.length - 1; bi >= 0; bi--) {
        const b = bolts[bi];
        b.op -= 0.025;
        ctx.beginPath();
        ctx.moveTo(b.pts[0].x, b.pts[0].y);
        b.pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.strokeStyle = `rgba(255,240,100,${b.op})`;
        ctx.lineWidth = b.w;
        ctx.shadowColor = 'rgba(245,194,0,.8)';
        ctx.shadowBlur = 12;
        ctx.stroke();
        ctx.shadowBlur = 0;
        if (b.op <= 0) bolts.splice(bi, 1);
      }
    }, 50);
  }

  /* ══════════════════════════════════════════════════════
     CARD 3 — Sonar + hexagon lattice + shooting nodes
     Sonar waves radiate from center. A hex grid glows and
     fades. Bright nodes travel along invisible paths and
     leave glowing trails.
  ══════════════════════════════════════════════════════ */
  if (index === 3) {
    const { cv, ctx } = setupCanvas('canvas3');
    let t = 0;

    // Sonar rings
    const sonarRings = Array.from({ length: 4 }, (_, i) => ({
      rad: 20, op: 0, maxRad: Math.max(cv.width, cv.height) * .8,
      delay: i * 60,
    }));
    let sonarTick = 0;

    // Hex grid points
    const hexPts = [];
    const HEX_SIZE = 55;
    for (let row = -2; row < cv.height / HEX_SIZE + 2; row++) {
      for (let col = -1; col < cv.width / (HEX_SIZE * 1.5) + 1; col++) {
        const x = col * HEX_SIZE * 1.732 + (row % 2) * HEX_SIZE * 0.866;
        const y = row * HEX_SIZE * 1.5;
        hexPts.push({ x, y, phase: rand(0, Math.PI * 2), spd: rand(0.02, 0.05) });
      }
    }

    // Traveling nodes along paths
    const travelers = Array.from({ length: 6 }, () => ({
      x: rand(0, cv.width), y: rand(0, cv.height),
      angle: rand(0, Math.PI * 2),
      speed: rand(1.5, 3.5),
      trail: [],
      r: rand(3, 6),
      turnRate: rand(-0.03, 0.03),
    }));

    (function draw() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      t++;
      sonarTick++;

      // Activate sonar rings sequentially
      sonarRings.forEach((r, i) => {
        if (sonarTick < r.delay) return;
        if (r.op === 0) r.op = 0.7;
        r.rad += 3.2; r.op -= 0.008;
        if (r.op <= 0) { r.rad = 20; r.op = 0; sonarTick = 0; }
        ctx.beginPath();
        ctx.arc(cv.width / 2, cv.height * .42, r.rad, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(245,194,0,${r.op})`;
        ctx.lineWidth = 1.5 + r.op; ctx.stroke();
      });

      // Hex grid glow
      hexPts.forEach(p => {
        p.phase += p.spd;
        const a = (Math.sin(p.phase) + 1) * 0.5 * 0.15;
        if (a < 0.01) return;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(245,194,0,${a})`; ctx.fill();
      });

      // Travelers
      travelers.forEach(tr => {
        tr.angle += tr.turnRate + Math.sin(t * 0.01) * 0.01;
        tr.x += Math.cos(tr.angle) * tr.speed;
        tr.y += Math.sin(tr.angle) * tr.speed;
        if (tr.x < 0) tr.x = cv.width;
        if (tr.x > cv.width) tr.x = 0;
        if (tr.y < 0) tr.y = cv.height;
        if (tr.y > cv.height) tr.y = 0;
        tr.trail.push({ x: tr.x, y: tr.y });
        if (tr.trail.length > 30) tr.trail.shift();

        // Trail
        tr.trail.forEach((pt, ti) => {
          const a = (ti / tr.trail.length) * 0.5;
          const r2 = tr.r * (ti / tr.trail.length);
          ctx.beginPath(); ctx.arc(pt.x, pt.y, r2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(245,194,0,${a})`; ctx.fill();
        });

        // Head glow
        const g = ctx.createRadialGradient(tr.x, tr.y, 0, tr.x, tr.y, tr.r * 3);
        g.addColorStop(0,  'rgba(255,230,80,.9)');
        g.addColorStop(.5, 'rgba(245,194,0,.4)');
        g.addColorStop(1,  'rgba(245,194,0,0)');
        ctx.beginPath(); ctx.arc(tr.x, tr.y, tr.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
      });

      requestAnimationFrame(draw);
    })();
  }

  /* ══════════════════════════════════════════════════════
     CARD 4 — Fireflies + organic leaf shower + ink ripples
     Golden fireflies float with sine-wave paths. Real
     leaf shapes fall with physics. Ink-drop circles expand
     and fade from random touch points periodically.
  ══════════════════════════════════════════════════════ */
  if (index === 4) {
    const { cv, ctx } = setupCanvas('canvas4');

    // Fireflies
    const flies = Array.from({ length: 25 }, () => ({
      x: rand(0, cv.width), y: rand(0, cv.height),
      baseY: rand(0, cv.height),
      vx: rand(0.3, 1.2) * (Math.random() > .5 ? 1 : -1),
      amp: rand(20, 60), freq: rand(0.01, 0.03),
      t: rand(0, 100),
      r: rand(2, 5), op: rand(0.4, 1),
      pulseSpd: rand(0.04, 0.1), phase: rand(0, Math.PI * 2),
    }));

    // Leaf shapes (bezier-drawn)
    const leaves = Array.from({ length: 22 }, () => ({
      x: rand(0, cv.width), y: rand(-300, cv.height),
      vy: rand(0.8, 2.2), vx: rand(-0.6, 0.6),
      rot: rand(0, Math.PI * 2), rotV: rand(-0.025, 0.025),
      size: rand(8, 20), op: rand(0.25, 0.6),
      swing: rand(0.01, 0.04), swingT: rand(0, Math.PI * 2),
      colorV: rand(180, 210), // golden-green leaf hue
    }));

    // Ink ripples
    const ripples = [];
    setInterval(() => {
      ripples.push({
        x: rand(cv.width * .1, cv.width * .9),
        y: rand(cv.height * .2, cv.height * .8),
        rad: 5, op: 0.4, maxR: rand(60, 130),
      });
    }, 1800);

    (function draw() {
      ctx.clearRect(0, 0, cv.width, cv.height);

      // Ripples
      for (let ri = ripples.length - 1; ri >= 0; ri--) {
        const r = ripples[ri];
        ctx.beginPath(); ctx.arc(r.x, r.y, r.rad, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(245,194,0,${r.op})`;
        ctx.lineWidth = 1.2; ctx.stroke();
        r.rad += 1.8; r.op -= 0.006;
        if (r.op <= 0) ripples.splice(ri, 1);
      }

      // Leaves (custom bezier shape)
      leaves.forEach(l => {
        l.swingT += l.swing;
        l.x += l.vx + Math.sin(l.swingT) * 1.2;
        l.y += l.vy; l.rot += l.rotV;
        ctx.save();
        ctx.translate(l.x, l.y); ctx.rotate(l.rot);
        ctx.beginPath();
        ctx.moveTo(0, -l.size);
        ctx.bezierCurveTo(l.size * .8, -l.size * .5, l.size * .8, l.size * .5, 0, l.size);
        ctx.bezierCurveTo(-l.size * .8, l.size * .5, -l.size * .8, -l.size * .5, 0, -l.size);
        ctx.fillStyle = `rgba(245,194,0,${l.op})`; ctx.fill();
        ctx.strokeStyle = `rgba(200,160,0,${l.op * .5})`; ctx.lineWidth = 0.8; ctx.stroke();
        // leaf vein
        ctx.beginPath(); ctx.moveTo(0, -l.size); ctx.lineTo(0, l.size);
        ctx.strokeStyle = `rgba(255,220,80,${l.op * .4})`; ctx.lineWidth = 0.6; ctx.stroke();
        ctx.restore();
        if (l.y > cv.height + 30) { l.x = rand(0, cv.width); l.y = -20; l.op = rand(0.25, 0.6); }
      });

      // Fireflies
      flies.forEach(f => {
        f.t += 1; f.phase += f.pulseSpd;
        f.x += f.vx;
        f.y = f.baseY + Math.sin(f.t * f.freq) * f.amp;
        if (f.x < -10) f.x = cv.width + 10;
        if (f.x > cv.width + 10) f.x = -10;
        const a = f.op * (0.6 + Math.sin(f.phase) * 0.4);
        const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 4);
        g.addColorStop(0,  `rgba(255,240,100,${a})`);
        g.addColorStop(.4, `rgba(245,194,0,${a * .5})`);
        g.addColorStop(1,  'rgba(245,194,0,0)');
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r * .6, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,200,${a})`; ctx.fill();
      });

      requestAnimationFrame(draw);
    })();
  }

  /* ══════════════════════════════════════════════════════
     CARD 5 — Warp speed + planet rings + meteor shower
     Stars stretch into warp lines on entry, then settle.
     Two orbiting ring systems spin at different speeds.
     Meteors with glowing heads and long trails streak by.
     Occasional nova burst flares from a random star.
  ══════════════════════════════════════════════════════ */
  if (index === 5) {
    const { cv, ctx } = setupCanvas('canvas5');
    let t = 0;

    // Stars with warp phase
    const stars = Array.from({ length: 200 }, () => ({
      x: rand(0, cv.width), y: rand(0, cv.height),
      vx: rand(-0.08, 0.08), vy: rand(-0.08, 0.08),
      r: rand(.2, 2), op: rand(.1, .9),
      spd: rand(.02, .12),
      warpLen: 0,
    }));

    // Orbiting ring systems (2 concentric rings)
    const CX = cv.width / 2, CY = cv.height * 0.42;
    const rings = [
      { r: 90,  speed: 0.008, dotCount: 8,  dotR: 3, angle: 0 },
      { r: 140, speed: -0.005, dotCount: 12, dotR: 2, angle: Math.PI / 12 },
    ];

    // Meteors
    const meteors = [];
    setInterval(() => {
      meteors.push({
        x: rand(0, cv.width), y: rand(0, cv.height * .4),
        len: rand(100, 200), speed: rand(8, 16),
        angle: Math.PI / 4 + rand(-.35, .35),
        op: 1, w: rand(1, 3),
        headR: rand(3, 6),
      });
    }, 700);

    // Nova flares
    const novas = [];
    setInterval(() => {
      novas.push({
        x: rand(cv.width * .1, cv.width * .9),
        y: rand(cv.height * .05, cv.height * .6),
        r: 0, op: .8, maxR: rand(40, 90),
      });
    }, 3500);

    (function draw() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      t++;

      // Stars — warp on first 60 frames, then drift
      stars.forEach(s => {
        s.op = Math.max(.05, Math.min(1, s.op + s.spd * (Math.random() > .5 ? 1 : -1)));
        if (t < 60) {
          // warp stretch
          const stretch = (1 - t / 60) * 40;
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(s.x - s.vx * stretch * 80, s.y - s.vy * stretch * 80);
          ctx.strokeStyle = `rgba(255,255,255,${s.op * .7})`;
          ctx.lineWidth = s.r; ctx.stroke();
        }
        s.x += s.vx; s.y += s.vy;
        if (s.x < 0) s.x = cv.width; if (s.x > cv.width) s.x = 0;
        if (s.y < 0) s.y = cv.height; if (s.y > cv.height) s.y = 0;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.op})`; ctx.fill();
      });

      // Orbital rings
      rings.forEach(ring => {
        ring.angle += ring.speed;
        // ring line
        ctx.beginPath(); ctx.ellipse(CX, CY, ring.r, ring.r * 0.28, -0.3, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(245,194,0,.12)'; ctx.lineWidth = 1; ctx.stroke();
        // orbiting dots
        for (let i = 0; i < ring.dotCount; i++) {
          const a = ring.angle + (i / ring.dotCount) * Math.PI * 2;
          const dx = Math.cos(a) * ring.r;
          const dy = Math.sin(a) * ring.r * 0.28;
          const glow = ctx.createRadialGradient(CX + dx, CY + dy, 0, CX + dx, CY + dy, ring.dotR * 3);
          glow.addColorStop(0,  'rgba(245,194,0,.9)');
          glow.addColorStop(1,  'rgba(245,194,0,0)');
          ctx.beginPath(); ctx.arc(CX + dx, CY + dy, ring.dotR * 3, 0, Math.PI * 2);
          ctx.fillStyle = glow; ctx.fill();
          ctx.beginPath(); ctx.arc(CX + dx, CY + dy, ring.dotR, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,240,100,.9)'; ctx.fill();
        }
      });

      // Meteors with glowing head
      for (let mi = meteors.length - 1; mi >= 0; mi--) {
        const m = meteors[mi];
        const x2 = m.x - Math.cos(m.angle) * m.len;
        const y2 = m.y - Math.sin(m.angle) * m.len;
        const g = ctx.createLinearGradient(m.x, m.y, x2, y2);
        g.addColorStop(0,   `rgba(255,240,100,${m.op})`);
        g.addColorStop(.2,  `rgba(245,194,0,${m.op * .6})`);
        g.addColorStop(1,   'rgba(245,194,0,0)');
        ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(x2, y2);
        ctx.strokeStyle = g; ctx.lineWidth = m.w; ctx.stroke();
        // glowing head
        const hg = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.headR * 2.5);
        hg.addColorStop(0,  `rgba(255,255,200,${m.op})`);
        hg.addColorStop(.5, `rgba(245,194,0,${m.op * .5})`);
        hg.addColorStop(1,  'rgba(245,194,0,0)');
        ctx.beginPath(); ctx.arc(m.x, m.y, m.headR * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = hg; ctx.fill();
        m.x += Math.cos(m.angle) * m.speed;
        m.y += Math.sin(m.angle) * m.speed;
        m.op -= 0.018;
        if (m.op <= 0) meteors.splice(mi, 1);
      }

      // Nova flares
      for (let ni = novas.length - 1; ni >= 0; ni--) {
        const n = novas[ni];
        const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        g.addColorStop(0,  `rgba(255,255,200,${n.op})`);
        g.addColorStop(.4, `rgba(245,194,0,${n.op * .4})`);
        g.addColorStop(1,  'rgba(245,194,0,0)');
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
        n.r += 2.5; n.op -= 0.014;
        if (n.op <= 0) novas.splice(ni, 1);
      }

      requestAnimationFrame(draw);
    })();
  }
}
</script>
</body>
