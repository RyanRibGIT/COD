<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D0D0D">
<title>CTOP — Feira de Informática</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold: #F5C200; --black: #0D0D0D; }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    overflow: hidden;
  }

  /* ══════════════════════════════
     SPLASH SCREEN
  ══════════════════════════════ */
  #splash {
    position: fixed; inset: 0;
    background: var(--black);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    transition: opacity 1s ease, visibility 1s ease;
  }
  #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .splash-ring {
    position: relative;
    width: 140px; height: 140px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
  }
  /* expanding pulse rings */
  .splash-ring::before,
  .splash-ring::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid var(--gold);
    animation: ringExpand 2s ease-out infinite;
  }
  .splash-ring::after { animation-delay: 1s; }
  @keyframes ringExpand {
    0%   { transform: scale(.75); opacity: 1; }
    100% { transform: scale(2);   opacity: 0; }
  }

  .splash-logo-wrap {
    width: 108px; height: 108px;
    border-radius: 50%;
    background: var(--black);
    border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    animation: splashPulse 1.6s ease-in-out infinite;
  }
  @keyframes splashPulse {
    0%,100% { box-shadow: 0 0 20px rgba(245,194,0,.4); }
    50%      { box-shadow: 0 0 60px rgba(245,194,0,1),  0 0 100px rgba(245,194,0,.3); }
  }
  /* logo.png inside splash circle */
  .splash-logo-wrap img {
    width: 80px; height: 80px;
    object-fit: contain;
    border-radius: 50%;
  }

  .splash-tagline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .splash-dots { display: flex; gap: 8px; }
  .splash-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .splash-dot:nth-child(2) { animation-delay: .2s; }
  .splash-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes dotBounce {
    0%,80%,100% { transform: translateY(0);    opacity: .4; }
    40%          { transform: translateY(-10px); opacity: 1;  }
  }

  /* ══════════════════════════════
     CARDS — common structure
  ══════════════════════════════ */
  .card {
    display: none;
    width: 100%; height: 100dvh;
    position: relative;
    overflow: hidden;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }
  .card.active {
    display: flex;
    animation: cardReveal 1.2s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: scale(1.06); }
    to   { opacity: 1; transform: scale(1);    }
  }

  /* Full-screen souvenir image */
  .card-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;        /* fills the entire screen */
    object-position: center;
    z-index: 1;
  }

  /* Thin vignette on top of image so logo/footer stay readable */
  .card-vignette {
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.45) 0%, transparent 22%),
      linear-gradient(to top,    rgba(0,0,0,.35) 0%, transparent 18%);
    z-index: 2;
    pointer-events: none;
  }

  /* ── Particle canvas overlay (per-card animations) ── */
  .particle-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  /* ══════════════════════════════
     LOGO BADGE  (top-center)
  ══════════════════════════════ */
  .logo-badge {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    z-index: 10;
    animation: badgeDrop .9s .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes badgeDrop {
    from { opacity: 0; transform: translateX(-50%) translateY(-28px) scale(.8); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0)     scale(1);  }
  }

  .logo-circle {
    width: 66px; height: 66px;
    border-radius: 50%;
    background: rgba(13,13,13,.85);
    border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    /* gentle ping */
    animation: logoPing 3s 1.5s ease-in-out infinite;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  @keyframes logoPing {
    0%,100% { box-shadow: 0 0 0  0  rgba(245,194,0,.55); }
    50%      { box-shadow: 0 0 0 14px rgba(245,194,0,0);  }
  }

  /* logo.png inside the badge circle */
  .logo-circle img {
    width: 50px; height: 50px;
    object-fit: contain;
    border-radius: 50%;
  }

  .logo-label {
    margin-top: 5px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: .6rem; letter-spacing: 3px;
    color: var(--gold); opacity: .85;
    text-shadow: 0 1px 4px rgba(0,0,0,.8);
  }

  /* ══════════════════════════════
     FOOTER  (bottom)
  ══════════════════════════════ */
  .card-footer {
    position: absolute;
    bottom: 12px; left: 0; right: 0;
    text-align: center;
    z-index: 10;
    font-family: 'Bebas Neue', sans-serif;
    font-size: .52rem; letter-spacing: 3px;
    color: rgba(245,194,0,.45);
    text-shadow: 0 1px 4px rgba(0,0,0,.9);
    animation: footerFade 1s 1.2s both;
  }
  @keyframes footerFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════
     SPLASH SCREEN
══════════════════════════════ -->
<div id="splash">
  <div class="splash-ring">
    <div class="splash-logo-wrap">
      <!--
        ╔══════════════════════════════════════╗
        ║  LOGO DA ESCOLA                      ║
        ║  Arquivo: logo.png                   ║
        ║  Coloque logo.png na mesma pasta     ║
        ║  deste arquivo HTML no repositório   ║
        ╚══════════════════════════════════════╝
      -->
      <img src="logo.png" alt="CTOP Logo">
    </div>
  </div>
  <p class="splash-tagline">CTOP · FEIRA DE INFORMÁTICA</p>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<!-- ══════════════════════════════
     CARD 1
══════════════════════════════ -->
<div id="card1" class="card">
  <!--
    ╔══════════════════════════════════════╗
    ║  IMAGEM DA LEMBRANCINHA 1            ║
    ║  Arquivo: imagem1.png                ║
    ║  Formato recomendado: 9:16 (retrato) ║
    ╚══════════════════════════════════════╝
  -->
  <img class="card-bg" src="imagem1.png" alt="Lembrancinha 1">
  <div class="card-vignette"></div>
  <canvas class="particle-canvas" id="canvas1"></canvas>

  <div class="logo-badge">
    <div class="logo-circle">
      <img src="logo.png" alt="CTOP">
    </div>
    <span class="logo-label">ESCOLA DE PROFISSÕES</span>
  </div>

  <div class="card-footer">CTOP · FEIRA DE INFORMÁTICA 2025</div>
</div>

<!-- ══════════════════════════════

══════════════════════════════ -->
<div id="card2" class="card">
  <!--
    ╔══════════════════════════════════════╗
    ║  IMAGEM DA LEMBRANCINHA 2            ║
    ║  Arquivo: imagem2.png                ║
    ╚══════════════════════════════════════╝
  -->
  <img class="card-bg" src="imagem2.png" alt="Lembrancinha 2">
  <div class="card-vignette"></div>
  <canvas class="particle-canvas" id="canvas2"></canvas>

  <div class="logo-badge">
    <div class="logo-circle">
      <img src="logo.png" alt="CTOP">
    </div>
    <span class="logo-label">ESCOLA DE PROFISSÕES</span>
  </div>

  <div class="card-footer">CTOP · FEIRA DE INFORMÁTICA 2025</div>
</div>

<!-- ══════════════════════════════

══════════════════════════════ -->
<div id="card3" class="card">
  <!--
    ╔══════════════════════════════════════╗
    ║  IMAGEM DA LEMBRANCINHA 3            ║
    ║  Arquivo: imagem3.png                ║
    ╚══════════════════════════════════════╝
  -->
  <img class="card-bg" src="imagem3.png" alt="Lembrancinha 3">
  <div class="card-vignette"></div>
  <canvas class="particle-canvas" id="canvas3"></canvas>

  <div class="logo-badge">
    <div class="logo-circle">
      <img src="logo.png" alt="CTOP">
    </div>
    <span class="logo-label">ESCOLA DE PROFISSÕES</span>
  </div>

  <div class="card-footer">CTOP · FEIRA DE INFORMÁTICA 2025</div>
</div>

<!-- ══════════════════════════════
     CARD 4
══════════════════════════════ -->
<div id="card4" class="card">
  <!--
    ╔══════════════════════════════════════╗
    ║  IMAGEM DA LEMBRANCINHA 4            ║
    ║  Arquivo: imagem4.png                ║
    ╚══════════════════════════════════════╝
  -->
  <img class="card-bg" src="imagem4.png" alt="Lembrancinha 4">
  <div class="card-vignette"></div>
  <canvas class="particle-canvas" id="canvas4"></canvas>

  <div class="logo-badge">
    <div class="logo-circle">
      <img src="logo.png" alt="CTOP">
    </div>
    <span class="logo-label">ESCOLA DE PROFISSÕES</span>
  </div>

  <div class="card-footer">CTOP · FEIRA DE INFORMÁTICA 2025</div>
</div>

<!-- ══════════════════════════════
     CARD 5
══════════════════════════════ -->
<div id="card5" class="card">
  <!--
    ╔══════════════════════════════════════╗
    ║  IMAGEM DA LEMBRANCINHA 5            ║
    ║  Arquivo: imagem5.png                ║
    ╚══════════════════════════════════════╝
  -->
  <img class="card-bg" src="imagem5.png" alt="Lembrancinha 5">
  <div class="card-vignette"></div>
  <canvas class="particle-canvas" id="canvas5"></canvas>

  <div class="logo-badge">
    <div class="logo-circle">
      <img src="logo.png" alt="CTOP">
    </div>
    <span class="logo-label">ESCOLA DE PROFISSÕES</span>
  </div>

  <div class="card-footer">CTOP · FEIRA DE INFORMÁTICA 2025</div>
</div>

<script>
/* ══════════════════════════════════════════════════
   RANDOM CARD SELECTION + SPLASH
══════════════════════════════════════════════════ */
const CARDS = ['card1', 'card2', 'card3', 'card4', 'card5'];
const CHOSEN = CARDS[Math.floor(Math.random() * CARDS.length)];
const chosenIndex = parseInt(CHOSEN.replace('card', ''));

document.getElementById(CHOSEN).classList.add('active');
setTimeout(() => document.getElementById('splash').classList.add('hidden'), 2200);

/* ══════════════════════════════════════════════════
   PARTICLE ANIMATIONS — one per card theme
══════════════════════════════════════════════════ */

/* ── Helpers ── */
function rand(min, max) { return Math.random() * (max - min) + min; }

function setupCanvas(id) {
  const cv = document.getElementById(id);
  if (!cv) return null;
  const ctx = cv.getContext('2d');
  function resize() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  return { cv, ctx };
}

/* ────────────────────────────────
   CARD 1 — golden floating sparks
──────────────────────────────── */
if (chosenIndex === 1) {
  const { cv, ctx } = setupCanvas('canvas1');
  const sparks = Array.from({ length: 55 }, () => ({
    x: rand(0, cv.width), y: rand(0, cv.height),
    vx: rand(-0.4, 0.4),  vy: rand(-0.8, -0.2),
    r: rand(1.5, 4),
    op: rand(0.4, 1),
    fade: rand(0.004, 0.012),
  }));

  function resetSpark(s) {
    s.x = rand(0, cv.width);
    s.y = cv.height + 10;
    s.vx = rand(-0.4, 0.4);
    s.vy = rand(-0.8, -0.2);
    s.r  = rand(1.5, 4);
    s.op = rand(0.5, 1);
    s.fade = rand(0.004, 0.012);
  }

  (function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    sparks.forEach(s => {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245,194,0,${s.op})`;
      ctx.fill();
      s.x += s.vx; s.y += s.vy; s.op -= s.fade;
      if (s.op <= 0 || s.y < -10) resetSpark(s);
    });
    requestAnimationFrame(draw);
  })();
}

/* ────────────────────────────────
   CARD 2 — matrix column rain
──────────────────────────────── */
if (chosenIndex === 2) {
  const { cv, ctx } = setupCanvas('canvas2');
  const FS = 13;
  let cols = Math.floor(cv.width / FS);
  let drops = Array(cols).fill(1);
  const CHARS = 'ABCDEF0123456789アイウエカキクコ<>{}[]#@!$%^&*';

  window.addEventListener('resize', () => {
    cols  = Math.floor(cv.width / FS);
    drops = Array(cols).fill(1);
  });

  setInterval(() => {
    ctx.fillStyle = 'rgba(4,4,12,.07)';
    ctx.fillRect(0, 0, cv.width, cv.height);
    for (let i = 0; i < drops.length; i++) {
      const ch = CHARS[Math.floor(Math.random() * CHARS.length)];
      const bright = Math.floor(120 + Math.random() * 80);
      ctx.fillStyle = `rgba(245,${bright},0,${0.4 + Math.random() * 0.5})`;
      ctx.font = FS + 'px Share Tech Mono, monospace';
      ctx.fillText(ch, i * FS, drops[i] * FS);
      if (drops[i] * FS > cv.height && Math.random() > .965) drops[i] = 0;
      drops[i]++;
    }
  }, 50);
}

/* ────────────────────────────────
   CARD 3 — expanding golden rings
──────────────────────────────── */
if (chosenIndex === 3) {
  const { cv, ctx } = setupCanvas('canvas3');
  const rings = [
    { delay: 0,    phase: 0   },
    { delay: 800,  phase: 0   },
    { delay: 1600, phase: 0   },
  ];
  const CX = () => cv.width  / 2;
  const CY = () => cv.height * 0.42;

  rings.forEach((r, i) => setTimeout(() => {
    r.active = true; r.rad = 20; r.op = 0.9;
  }, r.delay));

  (function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    rings.forEach(r => {
      if (!r.active) return;
      ctx.beginPath();
      ctx.arc(CX(), CY(), r.rad, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(245,194,0,${r.op})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      r.rad += 2.8; r.op -= 0.012;
      if (r.op <= 0) { r.rad = 20; r.op = 0.9; }
    });
    requestAnimationFrame(draw);
  })();
}

/* ────────────────────────────────
   CARD 4 — falling golden leaves
──────────────────────────────── */
if (chosenIndex === 4) {
  const { cv, ctx } = setupCanvas('canvas4');
  const leaves = Array.from({ length: 30 }, () => ({
    x:     rand(0, cv.width),
    y:     rand(-200, cv.height),
    size:  rand(5, 14),
    rot:   rand(0, Math.PI * 2),
    rotV:  rand(-0.03, 0.03),
    vy:    rand(0.6, 1.8),
    vx:    rand(-0.5, 0.5),
    op:    rand(0.3, 0.7),
    swing: rand(0.01, 0.04),
    swingT: rand(0, Math.PI * 2),
  }));

  function resetLeaf(l) {
    l.x = rand(0, cv.width); l.y = -20;
    l.size = rand(5, 14); l.op = rand(0.3, 0.7);
  }

  (function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    leaves.forEach(l => {
      l.swingT += l.swing;
      l.x += l.vx + Math.sin(l.swingT) * 0.8;
      l.y += l.vy; l.rot += l.rotV;
      ctx.save();
      ctx.translate(l.x, l.y);
      ctx.rotate(l.rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, l.size * 0.4, l.size, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(245,194,0,${l.op})`;
      ctx.fill();
      ctx.restore();
      if (l.y > cv.height + 20) resetLeaf(l);
    });
    requestAnimationFrame(draw);
  })();
}

/* ────────────────────────────────
   CARD 5 — meteors + star field
──────────────────────────────── */
if (chosenIndex === 5) {
  const { cv, ctx } = setupCanvas('canvas5');
  const stars = Array.from({ length: 160 }, () => ({
    x: rand(0, cv.width), y: rand(0, cv.height),
    r: rand(.3, 2.2), op: rand(.1, 1),
    spd: rand(.03, .15),
  }));
  const meteors = [];

  setInterval(() => {
    meteors.push({
      x: rand(0, cv.width), y: rand(0, cv.height * .3),
      len: rand(80, 160), speed: rand(7, 14),
      angle: Math.PI / 4 + rand(-.3, .3),
      op: 1, w: rand(.8, 2.5),
    });
  }, 750);

  (function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    // stars
    stars.forEach(s => {
      s.op = Math.max(.05, Math.min(1, s.op + s.spd * (Math.random() > .5 ? 1 : -1)));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.op})`;
      ctx.fill();
    });
    // meteors
    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      const x2 = m.x - Math.cos(m.angle) * m.len;
      const y2 = m.y - Math.sin(m.angle) * m.len;
      const g = ctx.createLinearGradient(m.x, m.y, x2, y2);
      g.addColorStop(0,   `rgba(245,194,0,${m.op})`);
      g.addColorStop(.35, `rgba(255,220,80,${m.op * .5})`);
      g.addColorStop(1,   'rgba(245,194,0,0)');
      ctx.beginPath();
      ctx.moveTo(m.x, m.y); ctx.lineTo(x2, y2);
      ctx.strokeStyle = g; ctx.lineWidth = m.w; ctx.stroke();
      m.x += Math.cos(m.angle) * m.speed;
      m.y += Math.sin(m.angle) * m.speed;
      m.op -= .022;
      if (m.op <= 0) meteors.splice(i, 1);
    }
    requestAnimationFrame(draw);
  })();
}
</script>
</body>
